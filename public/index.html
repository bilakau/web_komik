<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FmcComic – Baca Manga, Manhwa & Manhua Gratis</title>
  <meta name="description" content="FmcComic – Baca manga, manhwa, dan manhua gratis tanpa iklan. Koleksi lengkap komik terbaru dan terpopuler." />

  <link rel="icon" href="assets/icon.png" type="image/png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Progress Bar Reading -->
  <div id="progress-bar"></div>

  <!-- Navbar -->
  <nav id="main-nav">
    <div class="nav-inner">
      <div class="nav-left">
        <div class="logo" onclick="showHome()" aria-label="Home">
          <div class="logo-icon">
            <img src="assets/icon.png" onerror="this.src='https://placehold.co/40x40/f59e0b/000?text=F'" alt="FmcComic Logo" />
          </div>
          <span class="logo-text">Fmc<span>Comic</span></span>
        </div>

        <div class="nav-links">
          <button class="nav-link" onclick="showHome()" id="nav-home">
            <i class="fa fa-house"></i> Beranda
          </button>
          <button class="nav-link" onclick="showLatest()" id="nav-latest">
            <i class="fa fa-clock-rotate-left"></i> Terbaru
          </button>
          <button class="nav-link" onclick="showLibrary()" id="nav-library">
            <i class="fa fa-books"></i> Perpustakaan
          </button>
        </div>
      </div>

      <div class="nav-right">
        <button class="icon-btn" onclick="toggleSearch()" id="btn-search-nav" title="Cari Komik">
          <i class="fa fa-search"></i>
        </button>
        <button class="icon-btn" onclick="showBookmarks()" title="Favorit">
          <i class="fa fa-bookmark"></i>
        </button>
        <button class="icon-btn" onclick="showHistory()" title="Riwayat">
          <i class="fa fa-history"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Search Overlay -->
  <div id="search-overlay" class="search-overlay hidden">
    <div class="search-overlay-inner">
      <div class="search-box">
        <i class="fa fa-search search-icon"></i>
        <input type="text" id="search-input" placeholder="Cari judul komik, genre, atau pengarang..." autocomplete="off" />
        <button class="search-clear hidden" id="search-clear-btn" onclick="clearSearch()">
          <i class="fa fa-xmark"></i>
        </button>
      </div>
      <div class="search-filters">
        <select id="filter-genre">
          <option value="">Semua Genre</option>
        </select>
        <select id="filter-type">
          <option value="">Semua Tipe</option>
          <option value="manga">Manga</option>
          <option value="manhwa">Manhwa</option>
          <option value="manhua">Manhua</option>
        </select>
        <select id="filter-status">
          <option value="">Semua Status</option>
          <option value="ongoing">Ongoing</option>
          <option value="completed">Completed</option>
        </select>
        <button class="btn-primary" onclick="applySearch()">
          <i class="fa fa-search"></i> Cari
        </button>
      </div>
      <button class="search-close-btn" onclick="toggleSearch()">
        <i class="fa fa-xmark"></i> Tutup
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <main id="main-content">
    <div id="content-area"></div>
  </main>

  <!-- Mobile Bottom Nav -->
  <nav id="mobile-nav">
    <button class="mob-btn" onclick="showHome()" id="mob-home">
      <i class="fa fa-house"></i>
      <span>Beranda</span>
    </button>
    <button class="mob-btn" onclick="showLatest()" id="mob-latest">
      <i class="fa fa-fire"></i>
      <span>Terbaru</span>
    </button>
    <button class="mob-btn" onclick="toggleSearch()" id="mob-search">
      <i class="fa fa-search"></i>
      <span>Cari</span>
    </button>
    <button class="mob-btn" onclick="showHistory()" id="mob-history">
      <i class="fa fa-history"></i>
      <span>Riwayat</span>
    </button>
    <button class="mob-btn" onclick="showBookmarks()" id="mob-bookmark">
      <i class="fa fa-bookmark"></i>
      <span>Favorit</span>
    </button>
  </nav>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
